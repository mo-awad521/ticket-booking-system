version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: ticket-booking-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: ticket_booking
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: ticket-booking-redis
    ports:
      - '6379:6379'

volumes:
  mysql_data:
